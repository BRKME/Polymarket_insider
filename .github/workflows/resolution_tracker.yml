name: Resolution Tracker (Daily)

on:
  schedule:
    # Run once daily at 06:00 UTC
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: resolution-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track-resolutions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai
      
      - name: Run resolution tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "════════════════════════════════════════════════"
          echo "Resolution Tracker — $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "════════════════════════════════════════════════"
          python resolution_tracker.py
      
      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "Resolution Tracker Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet alerts.json resolution_stats.json 2>/dev/null; then
            echo "No changes to commit"
          else
            git add alerts.json resolution_stats.json
            git commit -m "chore: update resolution stats [skip ci]" || echo "No changes to commit"
            
            for i in {1..3}; do
              if git push; then
                echo "✓ Pushed"
                break
              else
                echo "⚠️  Retry $i/3"
                sleep 5
                git pull --rebase origin main || true
              fi
            done
          fi
