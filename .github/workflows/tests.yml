name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'tests/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openai httpx pytest

      - name: Run tests
        env:
          CI: "1"
        run: |
          python -m pytest tests/ -v --tb=short
